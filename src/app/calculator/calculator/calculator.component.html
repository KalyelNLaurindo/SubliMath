<section class="calculator-container p-6 bg-gray-100 min-h-screen">
  <!-- Título da Calculadora -->
  <h1 class="calculator-title text-3xl font-bold text-blue-600 mb-4">Calculadora</h1>

  <!-- Corpo da Calculadora -->
  <article class="calculator-body border rounded p-4 bg-white">
    <!-- Tela de exibição -->
    <input
      type="text"
      class="calculator-display w-full text-right p-2 text-xl border-b mb-4"
      placeholder="0"
      [(ngModel)]="display"
      readonly
    />

    <!-- Botões -->
    <div class="calculator-buttons grid grid-cols-4 gap-2">
      <button
        *ngFor="let btn of buttons"
        class="calculator-button bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600"
        (click)="onButtonClick(btn)"
      >
        {{ btn.label }}
      </button>
    </div>
  </article>
</section>
